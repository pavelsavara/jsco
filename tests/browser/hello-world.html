<!DOCTYPE html>
<html>

<head>
    <title>jsco hello-world WASI test</title>
</head>

<body>
    <script type="module">
        import { instantiateWasiComponent } from '/dist/index.js';

        window.__testResults = {};
        try {
            const stdoutChunks = [];
            const instance = await instantiateWasiComponent(
                '/integration-tests/hello-world-wat/hello.wasm',
                {
                    stdout: new WritableStream({
                        write(chunk) { stdoutChunks.push(new Uint8Array(chunk)); },
                    }),
                },
            );

            const runNs = instance.exports['wasi:cli/run@0.2.11'];
            try {
                await runNs.run();
            } catch (e) {
                // WasiExit with exitCode 0 is expected
                if (!e.message?.includes('exit') && e.exitCode !== 0) throw e;
            }

            const allBytes = new Uint8Array(stdoutChunks.reduce((acc, c) => [...acc, ...c], []));
            const stdout = new TextDecoder().decode(allBytes);

            window.__testResults = {
                success: true,
                stdout,
            };
        } catch (e) {
            window.__testResults = {
                success: false,
                error: e.message,
                stack: e.stack,
            };
        }
    </script>
</body>

</html>
