<!DOCTYPE html>
<html>

<head>
    <title>jsco hello-city test</title>
</head>

<body>
    <script type="module">
        import { createComponent } from '/dist/index.js';

        window.__testResults = {};
        try {
            const component = await createComponent('/integration-tests/hello-city-wat/hello-city.wasm', { noJspi: true });

            const logMessages = [];
            const imports = {
                'hello:city/logger@0.1.0': {
                    log: (msg) => { logMessages.push(msg); },
                },
            };

            const instance = await component.instantiate(imports);
            const greeter = instance.exports['hello:city/greeter@0.1.0'];

            await greeter.run({
                name: 'Prague',
                headCount: 1000000,
                budget: BigInt(200000000),
            });

            window.__testResults = {
                success: true,
                logMessages,
                greeting: logMessages[0] || '',
            };
        } catch (e) {
            window.__testResults = {
                success: false,
                error: e.message,
                stack: e.stack,
            };
        }
    </script>
</body>

</html>
