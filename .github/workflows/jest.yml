name: test

on:
  push:
    branches: [ "main" ]
  pull_request:

permissions:
  contents: read
  pull-requests: write

jobs:
  unit-tests:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        configuration: [Debug, Release]
    env:
      NODE_OPTIONS: --experimental-vm-modules
      Configuration: ${{ matrix.configuration }}

    steps:
    - uses: actions/checkout@v6
    - uses: actions/setup-node@v5
      with:
        node-version: 24

    - name: Install npm dependencies
      run: npm ci

    - name: Run Jest unit tests (${{ matrix.configuration }})
      run: |
        COVERAGE_FLAG=${{ matrix.configuration == 'Debug' && '--coverage' || '--no-coverage' }}
        node --experimental-vm-modules --experimental-wasm-jspi node_modules/.bin/jest $COVERAGE_FLAG --testPathIgnorePatterns integration.test echo-reactor.test hello-p2-world.test hello-world.test use-number-for-int64.test

    - name: Upload coverage (Debug only)
      if: matrix.configuration == 'Debug'
      uses: actions/upload-artifact@v4
      with:
        name: coverage-report
        path: coverage/

    - name: Coverage summary (Debug only)
      if: matrix.configuration == 'Debug' && github.event_name == 'pull_request'
      uses: davelosert/vitest-coverage-report-action@v2
      with:
        json-summary-path: coverage/coverage-summary.json
        json-final-path: coverage/coverage-final.json
        file-coverage-mode: all

  release-bundle-size:
    runs-on: ubuntu-latest
    env:
      Configuration: Release
      ContinuousIntegrationBuild: 'true'

    steps:
    - uses: actions/checkout@v6
    - uses: actions/setup-node@v5
      with:
        node-version: 24

    - name: Install npm dependencies
      run: npm ci

    - name: Build release bundle
      run: npm run build

    - name: Assert bundle size under limits
      run: |
        check_size() {
          local file=$1 limit=$2 label=$3
          local size
          size=$(stat --format=%s "$file")
          echo "${label}: ${size} bytes (limit: ${limit})"
          if [ "$size" -gt "$limit" ]; then
            echo "::error::${label} size ${size} bytes exceeds limit (${limit} bytes)"
            return 1
          fi
        }
        fail=0
        check_size dist/release/index.js                143360  "index.js (140 KB)"                || fail=1
        check_size dist/release/wasip2-via-wasip3.js     30720  "wasip2-via-wasip3.js (30 KB)"     || fail=1
        check_size dist/release/wasip2-via-wasip3-node.js 40960 "wasip2-via-wasip3-node.js (40 KB)" || fail=1
        check_size dist/release/wasip3.js                 35840  "wasip3.js (35 KB)"                || fail=1
        check_size dist/release/wasip3-node.js            61440  "wasip3-node.js (60 KB)"           || fail=1
        if [ "$fail" -eq 1 ]; then exit 1; fi
        echo "✓ All bundle sizes OK"

    - name: Run demos (Debug build)
      env:
        Configuration: Debug
      run: |
        npm run build
        npm run demo
        npm run demo:verbose

  browser-tests:
    runs-on: ubuntu-latest
    env:
      NODE_OPTIONS: --experimental-vm-modules

    steps:
    - uses: actions/checkout@v6
    - uses: actions/setup-node@v5
      with:
        node-version: 24

    - name: Install npm dependencies
      run: npm ci

    - name: Build
      run: npm run build

    - name: Install Playwright browsers
      run: npx playwright install --with-deps chromium firefox

    - name: Run Playwright browser tests
      run: npm run test:browser
