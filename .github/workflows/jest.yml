name: test

on:
  push:
    branches: [ "main" ]
  pull_request:

permissions:
  contents: read
  pull-requests: write

jobs:
  unit-tests:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        configuration: [Debug, Release]
    env:
      NODE_OPTIONS: --experimental-vm-modules
      Configuration: ${{ matrix.configuration }}

    steps:
    - uses: actions/checkout@v6
    - uses: actions/setup-node@v5
      with:
        node-version: 24

    - name: Install npm dependencies
      run: npm ci

    - name: Run Jest unit tests (${{ matrix.configuration }})
      run: |
        COVERAGE_FLAG=${{ matrix.configuration == 'Debug' && '--coverage' || '--no-coverage' }}
        node --experimental-vm-modules --experimental-wasm-jspi node_modules/.bin/jest $COVERAGE_FLAG --testPathIgnorePatterns integration.test echo-reactor.test hello-world.test

    - name: Upload coverage (Debug only)
      if: matrix.configuration == 'Debug'
      uses: actions/upload-artifact@v4
      with:
        name: coverage-report
        path: coverage/

    - name: Coverage summary (Debug only)
      if: matrix.configuration == 'Debug' && github.event_name == 'pull_request'
      uses: davelosert/vitest-coverage-report-action@v2
      with:
        json-summary-path: coverage/coverage-summary.json
        json-final-path: coverage/coverage-final.json
        file-coverage-mode: all

  release-bundle-size:
    runs-on: ubuntu-latest
    env:
      Configuration: Release
      ContinuousIntegrationBuild: 'true'

    steps:
    - uses: actions/checkout@v6
    - uses: actions/setup-node@v5
      with:
        node-version: 24

    - name: Install npm dependencies
      run: npm ci

    - name: Build release bundle
      run: npm run build

    - name: Assert bundle size under 90 KB
      run: |
        size=$(stat --format=%s dist/index.js)
        echo "Release bundle size: ${size} bytes"
        if [ "$size" -gt 92160 ]; then
          echo "::error::Release bundle size ${size} bytes exceeds 90 KB limit (92160 bytes)"
          exit 1
        fi
        echo "✓ Bundle size OK (under 90 KB)"

  browser-tests:
    runs-on: ubuntu-latest
    env:
      NODE_OPTIONS: --experimental-vm-modules

    steps:
    - uses: actions/checkout@v6
    - uses: actions/setup-node@v5
      with:
        node-version: 24

    - name: Install npm dependencies
      run: npm ci

    - name: Build
      run: npm run build

    - name: Install Playwright browsers
      run: npx playwright install --with-deps chromium

    - name: Run Playwright browser tests
      run: npm run test:browser
